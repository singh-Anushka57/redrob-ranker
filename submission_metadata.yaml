# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"
  - "Antigravity"

ai_usage_summary: |
  Used Claude for architecture design, scoring model design, and code review.
  Used Antigravity for code generation based on the architecture spec.
  All engineering decisions, scoring weights, disqualifier logic, honeypot
  detection rules, and behavioral hire-probability model were designed by the
  team. No candidate data was fed to any external LLM during ranking.
  rank.py runs with zero network calls and zero API dependencies.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Two-phase candidate ranking system using a three-stage architecture.

  Phase 1 (offline precompute, no time limit): All 100K candidate profiles are
  embedded using BAAI/bge-small-en-v1.5 (384-dim vectors). The job description
  is similarly embedded. A fast ANN retrieval step using numpy cosine similarity
  retrieves the top 500 candidates. These 500 are then reranked using a
  cross-encoder model (cross-encoder/ms-marco-MiniLM-L-6-v2) which reads the
  JD and candidate profile together for higher accuracy. A behavioral
  hire-probability model combines recruiter response rate, interview completion
  rate, offer acceptance rate, recency decay, and notice period into a
  conversion probability score. Reasoning strings are pre-generated from real
  profile facts and cached to disk.

  Phase 2 (rank.py, timed, <= 5 min, CPU only, no network): Loads all
  precomputed artifacts, fuses semantic fit score (cross-encoder 65% + BGE 35%)
  with skill match, experience, title, and location scores, multiplies by
  behavioral hire probability, applies disqualifier penalties for consulting-only
  careers and wrong-field titles, and honeypot penalties for impossible profiles.
  Outputs top 100 candidates as a validated CSV in under 2 seconds.

  Key differentiators: two-stage retrieval + cross-encoder reranking (same
  architecture as production search systems), behavioral hire-probability model
  modeling conversion not just fit, and explicit honeypot detection with 0
  honeypots in top 100.

